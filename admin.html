<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagMoment Admin</title>

<style>
:root {
  --bg: #f6f5f2;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #777;
  --border: #eaeaea;
  --primary: #111;
  --accent: #f0f0f0;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

/* TOP BAR */
.top {
  display:flex;
  gap:10px;
  padding:0 20px 15px;
  flex-wrap:wrap;
}

input, select {
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:white;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}

.primary {
  background: var(--primary);
  color:white;
}

/* GRID */
.container {
  padding: 0 20px 30px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
  transition:0.2s;
}

.card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* HEADER ROW */
.card-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.order-id {
  font-size:14px;
  color:var(--muted);
}

.status {
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background: var(--accent);
  font-weight:600;
}

/* DETAILS */
.meta {
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.section {
  margin-top:12px;
}

/* ITEMS */
.items {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.item {
  width:110px;
  background:#fafafa;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  text-align:center;
}

.item img {
  width:100%;
  border-radius:8px;
}

/* ACTIONS */
.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:10px;
}

.small {
  background:#eee;
  font-size:12px;
}

.status-buttons button {
  background:#eee;
}

.active {
  background:var(--primary) !important;
  color:white;
}
</style>
</head>

<body>

<div class="header">MagMoment Admin</div>

<div class="top">
  <input id="search" placeholder="Search name / phone / order id">
  <select id="filter">
    <option value="">All</option>
    <option>PAID</option>
    <option>PROCESSING</option>
    <option>SHIPPED</option>
    <option>DELIVERED</option>
  </select>
  <button class="primary" onclick="load()">Refresh</button>
</div>

<div class="container" id="orders"></div>

<script>
const API = "https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
const ADMIN_KEY = "Sathis@2026";

const statuses = ["PAID","PROCESSING","SHIPPED","DELIVERED"];

async function load() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const res = await fetch(`${API}/admin-orders`, {
    headers: { "x-admin-key": ADMIN_KEY }
  });

  let orders = await res.json();

  if (filter) orders = orders.filter(o => o.status === filter);

  if (search) {
    orders = orders.filter(o =>
      o.customer_name?.toLowerCase().includes(search) ||
      o.phone?.includes(search) ||
      o.razorpay_order_id?.includes(search)
    );
  }

  render(orders);
}

function render(list) {
  const box = document.getElementById("orders");

  box.innerHTML = list.map(o => `
    <div class="card">

      <div class="card-top">
        <div>
          <div><b>${o.customer_name}</b></div>
          <div class="order-id">${o.razorpay_order_id}</div>
          <div class="meta">${new Date(o.created_at).toLocaleString()}</div>
        </div>
        <div class="status">${o.status}</div>
      </div>

      <div class="section">
        ${o.phone} <br>
        <span class="meta">${o.address}</span>
      </div>

      <div class="section">
        <b>Total: ₹${o.grand_total}</b>
      </div>

      <div class="section items">
        ${o.order_items.map(i => {
          const img = i.photos?.[0] || "";
          return `
            <div class="item">
              ${img ? `<img src="${img}" onclick="window.open('${img}')">` : ""}
              <div style="font-size:11px;">${i.bundle_id}</div>
              <div style="font-size:11px;">₹${i.price}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="actions">
        <button class="small" onclick="copyOrder('${o.razorpay_order_id}')">Copy ID</button>
        <button class="small" onclick='downloadAll(${JSON.stringify(o.order_items)})'>Download</button>
        <a href="https://wa.me/91${o.phone}" target="_blank">
          <button class="small">WhatsApp</button>
        </a>
      </div>

      <div class="actions status-buttons">
        ${statuses.map(s => `
          <button class="${o.status===s?'active':''}"
            onclick="update('${o.id}','${s}')">${s}</button>
        `).join('')}
      </div>

    </div>
  `).join('');
}

async function update(id, status) {
  await fetch(`${API}/admin-update`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status })
  });

  load();
}

function copyOrder(id) {
  navigator.clipboard.writeText(id);
  alert("Copied");
}

async function downloadAll(items) {
  for (const i of items) {
    const img = i.photos?.[0];
    if (img) {
      const res = await fetch(img);
      const blob = await res.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "image.jpg";
      link.click();
    }
  }
}

load();
</script>

</body>
</html>
