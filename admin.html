<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin+</title>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }

    .top { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }

    input, select {
      padding:10px;
      border:1px solid #ddd;
      border-radius:6px;
    }

    .card {
      background:#fff;
      padding:16px;
      border-radius:10px;
      margin-bottom:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    .row {
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .items {
      margin-top:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .item {
      border:1px solid #eee;
      padding:8px;
      border-radius:8px;
      width:120px;
      background:#fafafa;
    }

    img {
      width:100%;
      border-radius:6px;
      cursor:pointer;
      transition:0.2s;
    }

    img:hover {
      transform:scale(1.05);
    }

    button {
      padding:6px 10px;
      margin-right:6px;
      margin-top:4px;
      cursor:pointer;
      border:none;
      border-radius:6px;
    }

    .status { font-weight:bold; }

    .small-btn {
      background:#eee;
      font-size:12px;
    }

    .primary { background:#111; color:#fff; }

  </style>
</head>

<body>

<h2>Admin+ Dashboard</h2>

<div class="top">
  <input id="search" placeholder="Search name / phone / order id" />
  
  <select id="filter">
    <option value="">All</option>
    <option>PAID</option>
    <option>PENDING</option>
    <option>FAILED</option>
    <option>SHIPPED</option>
    <option>DELIVERED</option>
  </select>

  <button class="primary" onclick="load()">Refresh</button>
</div>

<div id="orders"></div>

<script>
const API = "https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
const ADMIN_KEY = "Sathis@2026"; // 🔴 keep secret

async function load() {
  const q = document.getElementById("search").value;
  const f = document.getElementById("filter").value;

  const res = await fetch(`${API}/admin-orders?q=${encodeURIComponent(q)}&status=${f}`, {
    headers: { "x-admin-key": ADMIN_KEY }
  });

  const data = await res.json();
  render(data);
}

function render(list) {
  const box = document.getElementById("orders");

  box.innerHTML = list.map(o => `
    <div class="card">

      <div class="row">
        <div>
          <b>${o.customer_name}</b><br>
          ${o.phone}
        </div>
        <div class="status">${o.status}</div>
      </div>

      <div class="row" style="margin-top:6px;">
        <div>₹${o.grand_total}</div>
        <div>${new Date(o.created_at).toLocaleString()}</div>
      </div>

      <div style="margin-top:6px;">${o.address}</div>

      <div style="margin-top:10px;">
        <button class="small-btn" onclick='downloadAll(${JSON.stringify(o.order_items)})'>
          ⬇ Download All
        </button>
      </div>

      <div class="items">
        ${o.order_items.map(i => {
          const img = i.photos?.[0] || "";

          return `
            <div class="item">

              ${img ? `
                <a href="${img}" target="_blank">
                  <img src="${img}">
                </a>

                <button class="small-btn" onclick="downloadImage('${img}')">
                  ⬇ Download
                </button>
              ` : `
                <div style="font-size:12px;color:#aaa;">No Image</div>
              `}

              <div>${i.bundle_id}</div>
              <div>₹${i.price}</div>

            </div>
          `;
        }).join('')}
      </div>

      <div style="margin-top:10px;">
        <button onclick="update('${o.id}','SHIPPED')">Ship</button>
        <button onclick="update('${o.id}','DELIVERED')">Deliver</button>
      </div>

    </div>
  `).join('');
}

async function update(id, status) {
  await fetch(`${API}/admin-update`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status })
  });

  load();
}

// ✅ DOWNLOAD SINGLE IMAGE
async function downloadImage(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();

    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = "image.jpg";

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(blobUrl);

  } catch {
    alert("Download failed");
  }
}

// ✅ DOWNLOAD ALL IMAGES
async function downloadAll(items) {
  for (const i of items) {
    const img = i.photos?.[0];
    if (img) {
      await downloadImage(img);
    }
  }
}

load();
</script>

</body>
</html>
