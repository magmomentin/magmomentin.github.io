<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagMoment Admin</title>

<style>
:root {
  --bg: #f6f5f2;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #777;
  --border: #eaeaea;
  --primary: #111;
  --accent: #f0f0f0;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.top {
  display:flex;
  gap:10px;
  padding:0 20px 15px;
  flex-wrap:wrap;
}

input, select {
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:white;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}

.primary {
  background: var(--primary);
  color:white;
}

.container {
  padding: 0 20px 30px;
}

.card {
  background: var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

.card-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.order-id {
  font-size:14px;
  color:var(--muted);
}

.status {
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  font-weight:600;
  border:1px solid var(--border);
  cursor:pointer;
}

.meta {
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.section {
  margin-top:12px;
}

.items {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.item {
  width:140px;
  background:#fafafa;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  text-align:center;
}

.item img {
  width:48%;
  border-radius:6px;
  cursor:pointer;
}

.empty {
  padding:40px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">MagMoment Admin</div>

<div class="top">
  <input id="search" placeholder="Search">
  <select id="filter">
    <option value="">All</option>
    <option>PAID</option>
    <option>PROCESSING</option>
    <option>SHIPPED</option>
    <option>DELIVERED</option>
  </select>
  <button class="primary" onclick="load()">Refresh</button>
</div>

<div class="container" id="orders"></div>

<script>
const API = "https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
const ADMIN_KEY = "Sathis@2026";

const STATUSES = ["PAID","PROCESSING","SHIPPED","DELIVERED"];

// ✅ IST formatter (safe)
function formatIST(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
  return d.toLocaleString('en-IN', {
    timeZone: 'Asia/Kolkata',
    day: '2-digit',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  });
}

async function load() {
  const res = await fetch(`${API}/admin-orders`, {
    headers: { "x-admin-key": ADMIN_KEY }
  });

  let orders = await res.json();

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  if (filter) orders = orders.filter(o => o.status === filter);

  if (search) {
    orders = orders.filter(o =>
      o.customer_name?.toLowerCase().includes(search) ||
      o.phone?.includes(search) ||
      o.razorpay_order_id?.includes(search)
    );
  }

  // ✅ latest first
  orders.sort((a, b) =>
    new Date(b.created_at) - new Date(a.created_at)
  );

  render(orders);
}

async function updateStatus(id, status) {
  try {
    const res = await fetch(`${API}/update-order-status`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": ADMIN_KEY
      },
      body: JSON.stringify({ id, status })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed");

    // reload to reflect change
    load();

  } catch (err) {
    alert("Status update failed");
    console.error(err);
  }
}

function render(list) {
  const box = document.getElementById("orders");

  if (!list.length) {
    box.innerHTML = `<div class="empty">No orders found</div>`;
    return;
  }

  box.innerHTML = list.map(o => `
    <div class="card">

      <div class="card-top">
        <div>
          <div><b>${o.customer_name}</b></div>
          <div class="order-id">${o.razorpay_order_id}</div>
          <div class="meta">${formatIST(o.created_at)}</div>
        </div>

        <select 
          class="status"
          onchange="updateStatus('${o.id}', this.value)"
        >
          ${STATUSES.map(s => `
            <option value="${s}" ${s===o.status?'selected':''}>
              ${s}
            </option>
          `).join('')}
        </select>
      </div>

      <div class="section">
        ${o.phone}<br>
        <span class="meta">${o.address}</span>
      </div>

      <div class="section">
        <b>Total: ₹${o.grand_total}</b><br>
        <span class="meta">
          Items: ${o.order_items.reduce((s,i)=>s+(i.quantity||1),0)} |
          Subtotal: ₹${o.total} | Shipping: ₹${o.shipping}
        </span>
      </div>

      <div class="section items">
        ${o.order_items.map(i => {
          const images = i.photos || [];
          const qty = i.quantity || 1;

          return `
            <div class="item">

              <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:6px;">
                ${images.map(img => `
                  <img 
                    src="${img}" 
                    onclick="window.open('${img}','_blank')"
                  >
                `).join('')}
              </div>

              <div style="font-size:11px;">${i.product_id || i.bundle_id}</div>

              <div style="font-size:11px;">
                ₹${i.price} × ${qty}
              </div>

              <div style="font-size:11px;font-weight:600;">
                ₹${i.price * qty}
              </div>

              <div style="font-size:10px;color:#888;">
                ${images.length} photo${images.length !== 1 ? 's' : ''}
              </div>

            </div>
          `;
        }).join('')}
      </div>

    </div>
  `).join('');
}

load();
</script>

</body>
</html>
