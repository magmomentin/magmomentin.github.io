<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagMoment Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{--bg:#f6f5f2;--card:#fff;--text:#111;--muted:#777;--border:#eee;}
body{margin:0;font-family:system-ui;background:var(--bg);}
.hidden{display:none}

/* HEADER */
.header{
  position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);
  padding:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.header input,.header select{padding:8px;border-radius:10px;border:1px solid #ddd}
.btn{padding:8px 10px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer}
.btn.primary{background:#111;color:#fff}

/* GRID */
.container{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}

/* CARD */
.card{background:#fff;border-radius:14px;padding:14px;border:1px solid #eee;}
.row{display:flex;justify-content:space-between}
.meta{font-size:12px;color:#777}
.price{font-weight:700;margin-top:5px}

/* STATUS */
.badge{padding:4px 8px;border-radius:20px;font-size:11px;font-weight:700}
.PAID{background:#e8f5e9}
.PROCESSING{background:#fff8e1}
.SHIPPED{background:#e3f2fd}
.DELIVERED{background:#ede7f6}

/* ITEMS */
.items{margin-top:10px}
.img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.img-grid img{width:100%;border-radius:6px;cursor:pointer}

/* LOGIN */
.login{height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;padding:25px;border-radius:16px;width:300px}
.login input{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd}
.login button{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:10px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal img{max-width:90%;max-height:90%}
</style>
</head>

<body>

<div id="loginView" class="login">
  <div class="login-box">
    <h3>Admin</h3>
    <input id="key" placeholder="ADMIN_KEY">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="appView" class="hidden">

  <div class="header">
    <input id="search" placeholder="Search">
    <select id="filter">
      <option value="">All</option>
      <option>PAID</option>
      <option>PROCESSING</option>
      <option>SHIPPED</option>
      <option>DELIVERED</option>
    </select>

    <button class="btn" onclick="load()">↻</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <div class="container" id="orders"></div>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
const API="https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
let ALL=[];

function getKey(){return localStorage.getItem("ADMIN_KEY")}

function login(){
  const k=document.getElementById("key").value.trim();
  if(!k)return;
  localStorage.setItem("ADMIN_KEY",k);
  init();
}

function logout(){localStorage.removeItem("ADMIN_KEY");location.reload()}

function formatIST(d){
  const x=new Date(d.endsWith('Z')?d:d+'Z');
  return x.toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
}

function init(){
  if(!getKey()){loginView.classList.remove("hidden");return;}
  loginView.classList.add("hidden");appView.classList.remove("hidden");
  load();
}

async function load(){
  const res=await fetch(`${API}/admin-orders`,{headers:{"x-admin-key":getKey()}});
  if(res.status===401){logout();return;}
  ALL=await res.json();
  ALL.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  applyFilters();
}

function applyFilters(){
  const s=search.value.toLowerCase();
  const f=filter.value;
  let list=ALL;
  if(f) list=list.filter(o=>o.status===f);
  if(s) list=list.filter(o=>o.customer_name?.toLowerCase().includes(s)||o.phone?.includes(s));
  render(list);
}

search.oninput=applyFilters;
filter.onchange=applyFilters;

async function updateStatus(id,status){
  const res = await fetch(`${API}/update-order-status`,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-key":getKey()},
    body:JSON.stringify({id,status})
  });
  if(!res.ok){
    alert("Failed to update order status. Please try again.");
    return;
  }
  ALL = ALL.map(order => order.id === id ? { ...order, status } : order);
  applyFilters();
}

/* WhatsApp */
function openWhatsApp(order){
  const phone = order.phone.replace(/\D/g,'');
  const msg = encodeURIComponent(
`Hi ${order.customer_name},
Your MagMoment order is now ${order.status}.
Order ID: ${order.razorpay_order_id}
Thank you ✨`
  );
  window.open(`https://wa.me/91${phone}?text=${msg}`,'_blank');
}

/* CSV EXPORT */
function exportCSV(){
  if(!ALL.length) return;

  const rows = [["Name","Phone","OrderID","Status","Total","Date"]];

  ALL.forEach(o=>{
    rows.push([
      o.customer_name,
      o.phone,
      o.razorpay_order_id,
      o.status,
      o.grand_total,
      formatIST(o.created_at)
    ]);
  });

  const csv = rows.map(r=>r.join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "orders.csv";
  a.click();
}

/* DOWNLOAD ZIP */
async function downloadOrderImages(orderId){
  const order=ALL.find(o=>o.id===orderId);
  if(!order)return;

  const zip=new JSZip();
  let c=0;

  await Promise.all(order.order_items.flatMap(i =>
    (i.photos||[]).map(url =>
      fetch(url).then(r=>r.blob()).then(b=>{
        zip.file(`img_${++c}.jpg`,b);
      })
    )
  ));

  const content=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download=`order_${orderId}.zip`;
  a.click();
}

function showImg(src){
  modal.style.display="flex";
  modalImg.src=src;
}

function render(list){
  const box=document.getElementById("orders");

  box.innerHTML=list.map(o=>`
    <div class="card">

      <div class="row">
        <b>${o.customer_name}</b>
        <span class="badge ${o.status}">${o.status}</span>
      </div>

      <div class="meta">${o.razorpay_order_id}</div>
      <div class="meta">${formatIST(o.created_at)}</div>

      <div class="price">₹${o.grand_total}</div>

      <select onchange="updateStatus('${o.id}',this.value)">
        ${["PAID","PROCESSING","SHIPPED","DELIVERED"].map(s=>`
          <option ${s===o.status?'selected':''}>${s}</option>
        `).join('')}
      </select>

      <button class="btn primary" onclick='openWhatsApp(${JSON.stringify(o)})'>
        WhatsApp Customer
      </button>

      <button class="btn" onclick="downloadOrderImages('${o.id}')">
        Download Images
      </button>

      <div class="items">
        ${o.order_items.map(i=>{
          const imgs=i.photos||[];
          return `
            <div class="img-grid">
              ${imgs.slice(0,4).map(img=>`
                <img src="${img}" onclick="showImg('${img}')">
              `).join('')}
            </div>
          `;
        }).join('')}
      </div>

    </div>
  `).join('');
}

init();
</script>

</body>
</html>
