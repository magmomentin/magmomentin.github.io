<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin+</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }

.top { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }

input, select {
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

.card {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status {
  font-weight:bold;
  padding:4px 8px;
  border-radius:6px;
  background:#eee;
}

.meta {
  font-size:12px;
  color:#777;
}

.section { margin-top:10px; }

.items {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.item {
  width:130px;
  border:1px solid #eee;
  border-radius:8px;
  padding:8px;
  background:#fafafa;
}

img {
  width:100%;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

img:hover { transform:scale(1.05); }

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.primary { background:#111; color:#fff; }
.small { background:#eee; font-size:12px; }

.active {
  background:#111 !important;
  color:#fff;
}
</style>
</head>

<body>

<h2>Admin+ Dashboard</h2>

<div class="top">
  <input id="search" placeholder="Search name / phone / order id">
  <select id="filter">
    <option value="">All</option>
    <option>PAID</option>
    <option>PROCESSING</option>
    <option>SHIPPED</option>
    <option>DELIVERED</option>
  </select>
  <button class="primary" onclick="load()">Refresh</button>
</div>

<div id="orders"></div>

<script>
const API = "https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
const ADMIN_KEY = "Sathis@2026";

const statuses = ["PAID","PROCESSING","SHIPPED","DELIVERED"];

async function load() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const res = await fetch(`${API}/admin-orders`, {
    headers: { "x-admin-key": ADMIN_KEY }
  });

  let orders = await res.json();

  // ✅ Filter
  if (filter) {
    orders = orders.filter(o => o.status === filter);
  }

  // ✅ Search
  if (search) {
    orders = orders.filter(o =>
      o.customer_name?.toLowerCase().includes(search) ||
      o.phone?.includes(search) ||
      o.razorpay_order_id?.includes(search)
    );
  }

  render(orders);
}

function render(list) {
  const box = document.getElementById("orders");

  box.innerHTML = list.map(o => `
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div>
          <b>Order: ${o.razorpay_order_id || o.id}</b>
          <div class="meta">${new Date(o.created_at).toLocaleString()}</div>
        </div>
        <div class="status">${o.status}</div>
      </div>

      <!-- CUSTOMER -->
      <div class="section">
        <b>${o.customer_name}</b><br>
        ${o.phone}<br>
        <div class="meta">${o.address}</div>
      </div>

      <!-- TOTAL -->
      <div class="section">
        <b>Total: ₹${o.grand_total}</b>
      </div>

      <!-- ACTIONS -->
      <div class="section">
        <button class="small" onclick="copyOrder('${o.razorpay_order_id}')">
          Copy Order ID
        </button>

        <button class="small" onclick='downloadAll(${JSON.stringify(o.order_items)})'>
          Download All Images
        </button>

        <a href="https://wa.me/91${o.phone}" target="_blank">
          <button class="small">WhatsApp</button>
        </a>
      </div>

      <!-- ITEMS -->
      <div class="section items">
        ${o.order_items.map(i => {
          const img = i.photos?.[0] || "";
          return `
            <div class="item">

              ${img ? `<a href="${img}" target="_blank"><img src="${img}"></a>` : ""}

              <div style="font-size:12px;margin-top:6px;">
                ${i.bundle_id}
              </div>

              <div style="font-size:12px;">
                ₹${i.price}
              </div>

              ${img ? `
                <button class="small" onclick="downloadImage('${img}')">
                  ⬇ Download
                </button>
              ` : ""}

            </div>
          `;
        }).join('')}
      </div>

      <!-- STATUS -->
      <div class="section">
        ${statuses.map(s => `
          <button class="${o.status===s?'active':''}"
            onclick="update('${o.id}','${s}')">
            ${s}
          </button>
        `).join('')}
      </div>

    </div>
  `).join('');
}

async function update(id, status) {
  await fetch(`${API}/admin-update`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status })
  });

  load();
}

// COPY ORDER ID
function copyOrder(id) {
  navigator.clipboard.writeText(id);
  alert("Order ID copied");
}

// DOWNLOAD SINGLE IMAGE
async function downloadImage(url) {
  const res = await fetch(url);
  const blob = await res.blob();
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "image.jpg";
  link.click();
}

// DOWNLOAD ALL IMAGES
async function downloadAll(items) {
  for (const i of items) {
    const img = i.photos?.[0];
    if (img) await downloadImage(img);
  }
}

load();
</script>

</body>
</html>
