<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagMoment Admin</title>

<style>
:root {
  --bg: #f6f5f2;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #777;
  --border: #eaeaea;
  --primary: #111;
  --accent: #f0f0f0;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.top {
  display:flex;
  gap:10px;
  padding:0 20px 15px;
  flex-wrap:wrap;
}

input, select {
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:white;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}

.primary {
  background: var(--primary);
  color:white;
}

.container {
  padding: 0 20px 30px;
}

.card {
  background: var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

.card-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.order-id {
  font-size:14px;
  color:var(--muted);
}

.status {
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background: var(--accent);
  font-weight:600;
}

.meta {
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.section {
  margin-top:12px;
}

.items {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.item {
  width:120px;
  background:#fafafa;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  text-align:center;
}

.item img {
  width:100%;
  border-radius:8px;
}

.small {
  background:#eee;
  font-size:12px;
}

.active {
  background:var(--primary) !important;
  color:white;
}
</style>
</head>

<body>

<div class="header">MagMoment Admin</div>

<div class="top">
  <input id="search" placeholder="Search">
  <select id="filter">
    <option value="">All</option>
    <option>PAID</option>
    <option>PROCESSING</option>
    <option>SHIPPED</option>
    <option>DELIVERED</option>
  </select>
  <button class="primary" onclick="load()">Refresh</button>
</div>

<div class="container" id="orders"></div>

<script>
const API = "https://phxhhzwuamdoclklvccb.supabase.co/functions/v1";
const ADMIN_KEY = "Sathis@2026";

const statuses = ["PAID","PROCESSING","SHIPPED","DELIVERED"];

async function load() {
  const res = await fetch(`${API}/admin-orders`, {
    headers: { "x-admin-key": ADMIN_KEY }
  });

  let orders = await res.json();

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  if (filter) orders = orders.filter(o => o.status === filter);

  if (search) {
    orders = orders.filter(o =>
      o.customer_name?.toLowerCase().includes(search) ||
      o.phone?.includes(search) ||
      o.razorpay_order_id?.includes(search)
    );
  }

  render(orders);
}

function render(list) {
  const box = document.getElementById("orders");

  box.innerHTML = list.map(o => `
    <div class="card">

      <div class="card-top">
        <div>
          <div><b>${o.customer_name}</b></div>
          <div class="order-id">${o.razorpay_order_id}</div>
          <div class="meta">${new Date(o.created_at).toLocaleString()}</div>
        </div>
        <div class="status">${o.status}</div>
      </div>

      <div class="section">
        ${o.phone}<br>
        <span class="meta">${o.address}</span>
      </div>

      <div class="section">
        <b>Total: ₹${o.grand_total}</b><br>
        <span class="meta">
          Items: ${o.order_items.reduce((s,i)=>s+(i.quantity||1),0)}
        </span>
      </div>

      <div class="section items">
        ${o.order_items.map(i => {
          const img = i.photos?.[0] || "";
          const qty = i.quantity || 1;
          return `
            <div class="item">
              ${img ? `<img src="${img}" onclick="window.open('${img}')">` : ""}
              <div style="font-size:11px;">${i.bundle_id}</div>
              <div style="font-size:11px;">₹${i.price} × ${qty}</div>
              <div style="font-size:11px;font-weight:600;">₹${i.price * qty}</div>
            </div>
          `;
        }).join('')}
      </div>

    </div>
  `).join('');
}

load();
</script>

</body>
</html>
